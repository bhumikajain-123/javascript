<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
            font-family:Arial, sans-serif;
        }

        .container{
            text-align:center;
            padding:40px 60px;
            border-radius:20px;
            background:rgba(255,255,255,0.1);
            backdrop-filter:blur(10px);
            box-shadow:0 8px 32px rgba(0,0,0,0.3);
        }

        h2{
            color:white;
            margin-bottom:20px;
            letter-spacing:2px;
        }

        #clock{
            color:#00ffff;
            font-size:70px;
            text-shadow:
                0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 40px #00ffff;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>DIGITAL CLOCK ⏰</h2>
        <h1 id="clock"></h1>
    </div>

    <script src="script.js"></script>

</body>
</html>
