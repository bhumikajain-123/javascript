<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Changer</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.5s ease;
            font-family: Arial, sans-serif;
        }

        button{
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background-color: black;
            color: white;
            transition: 0.3s;
        }

        button:hover{
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <button onclick="changeBackground()">
        Change Background 🎨
    </button>

    <script src="script.js"></script>

</body>
</html>
